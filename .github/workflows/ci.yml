name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17.0.19+10'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Install Bicep
        run: az bicep install --version v0.44.1

      - name: Validate portable Azure infrastructure
        run: npm run infra:validate

      - name: Check formatting
        run: npm run format:check

      - name: Audit dependencies
        run: npm run audit

      - name: Check types
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Check dependencies
        run: npm run dependencies:check

      - name: Export web app
        run: npm run web:export

      - name: Install Android packages
        run: >-
          sdkmanager
          "platform-tools"
          "platforms;android-36"
          "build-tools;35.0.0"
          "build-tools;36.0.0"
          "ndk;27.1.12297006"
          "cmake;3.22.1"

      - name: Generate Android project
        run: npm run native:generate:android

      - name: Build Android debug APK
        env:
          NODE_ENV: development
        run: apps/mobile/android/gradlew -p apps/mobile/android assembleDebug --no-daemon -PreactNativeArchitectures=arm64-v8a
